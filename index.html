<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        #gameState {
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
            min-height: 40px;
        }

        #gameState.player-turn {
            color: #667eea;
            font-weight: bold;
        }

        #gameState.computer-turn {
            color: #764ba2;
            font-weight: bold;
        }

        #gameState.game-over {
            color: #e74c3c;
            font-size: 20px;
        }

        .board {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .row {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }

        .row-label {
            width: 30px;
            font-weight: bold;
            color: #666;
        }

        .circles {
            display: flex;
            gap: 10px;
        }

        .circle {
            width: 45px;
            height: 45px;
            border: 3px solid #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s;
            background: white;
        }

        .circle:hover:not(.removed) {
            transform: scale(1.1);
            background: #f0f0f0;
        }

        .circle.removed {
            background: #bdc3c7;
            border-color: #95a5a6;
            cursor: not-allowed;
            color: #7f8c8d;
        }

        .circle.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        #submitBtn {
            background: #667eea;
            color: white;
        }

        #submitBtn:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
        }

        #submitBtn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }

        #resetBtn {
            background: #95a5a6;
            color: white;
        }

        #resetBtn:hover {
            background: #7f8c8d;
            transform: translateY(-2px);
        }

        #settingsBtn {
            background: #f39c12;
            color: white;
        }

        #settingsBtn:hover {
            background: #e67e22;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .modal-content label {
            display: block;
            margin: 15px 0;
            font-size: 16px;
        }

        .modal-content input[type="radio"] {
            margin-right: 10px;
        }

        .modal-content button {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 16px;
        }

        .info-text {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⭕ Circle Game</h1>
        
        <div id="gameState">Select circles to remove from rows. Click a circle to select/deselect it.</div>

        <div class="board" id="board"></div>

        <div class="controls">
            <button id="submitBtn" onclick="submitMove()">Submit Move</button>
            <button id="resetBtn" onclick="resetGame()">New Game</button>
            <button id="settingsBtn" onclick="showSettings()">Settings</button>
        </div>

        <div class="info-text">
            💡 The player who takes the last circle loses!
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h2>Game Settings</h2>
            
            <label>
                <input type="radio" name="difficulty" value="easy"> Easy
            </label>
            <label>
                <input type="radio" name="difficulty" value="medium" checked> Medium
            </label>
            <label>
                <input type="radio" name="difficulty" value="hard"> Hard
            </label>

            <label style="margin-top: 30px;">
                <input type="radio" name="turn-order" value="player-first" checked> You go first
            </label>
            <label>
                <input type="radio" name="turn-order" value="computer-first"> Computer goes first
            </label>
            <label>
                <input type="radio" name="turn-order" value="random"> Random
            </label>

            <button onclick="applySettings()" style="background: #667eea; color: white;">Apply & Start Game</button>
            <button onclick="closeSettings()" style="background: #95a5a6; color: white; margin-left: 10px;">Cancel</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
