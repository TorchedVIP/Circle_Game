<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        #gameState {
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
            min-height: 40px;
        }

        #gameState.player-turn {
            color: #667eea;
            font-weight: bold;
        }

        #gameState.opponent-turn {
            color: #764ba2;
            font-weight: bold;
        }

        #gameState.game-over {
            color: #e74c3c;
            font-size: 20px;
        }

        .board {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .row {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }

        .row-label {
            width: 30px;
            font-weight: bold;
            color: #666;
        }

        .circles {
            display: flex;
            gap: 10px;
        }

        .circle {
            width: 45px;
            height: 45px;
            border: 3px solid #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s;
            background: white;
        }

        .circle:hover:not(.removed) {
            transform: scale(1.1);
            background: #f0f0f0;
        }

        .circle.removed {
            background: #bdc3c7;
            border-color: #95a5a6;
            cursor: not-allowed;
            color: #7f8c8d;
        }

        .circle.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        #submitBtn {
            background: #667eea;
            color: white;
        }

        #submitBtn:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
        }

        #submitBtn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }

        #mainMenuBtn {
            background: #95a5a6;
            color: white;
        }

        #mainMenuBtn:hover {
            background: #7f8c8d;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .modal-content label {
            display: block;
            margin: 15px 0;
            font-size: 16px;
        }

        .modal-content input[type="radio"],
        .modal-content input[type="text"] {
            margin-right: 10px;
        }

        .modal-content input[type="text"] {
            padding: 10px;
            font-size: 18px;
            width: 100px;
            text-align: center;
            letter-spacing: 5px;
        }

        .modal-content button {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 16px;
            background: #667eea;
            color: white;
        }

        .modal-content button:hover {
            background: #5568d3;
        }

        .modal-content .cancel-btn {
            background: #95a5a6;
            margin-left: 10px;
        }

        .modal-content .cancel-btn:hover {
            background: #7f8c8d;
        }

        .game-code {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 8px;
        }

        .game-code p {
            margin: 5px 0;
            color: #666;
        }

        .game-code .code {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
            letter-spacing: 3px;
            font-family: 'Courier New', monospace;
        }

        .info-text {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 20px;
        }

        .mode-toggle {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .mode-btn {
            padding: 10px 20px;
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .mode-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .mode-btn:hover {
            transform: translateY(-2px);
        }

        .hidden {
            display: none !important;
        }

        #singlePlayerOptions button,
        #multiplayerOptions button {
            width: 100%;
            margin: 10px 0;
            padding: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⭕ Circle Game</h1>
        
        <!-- Main Menu Screen -->
        <div id="mainMenuScreen">
            <div class="mode-toggle">
                <button class="mode-btn active" onclick="setGameMode('single', this)">Play vs Computer</button>
                <button class="mode-btn" onclick="setGameMode('multi', this)">Play with Friend</button>
            </div>

            <!-- Single Player Options -->
            <div id="singlePlayerOptions">
                <div style="margin: 20px 0;">
                    <div style="font-weight: bold; margin-bottom: 10px; color: #333;">Difficulty:</div>
                    <label style="display: block; margin: 10px 0; font-size: 16px;">
                        <input type="radio" name="difficulty" value="easy"> Easy
                    </label>
                    <label style="display: block; margin: 10px 0; font-size: 16px;">
                        <input type="radio" name="difficulty" value="medium" checked> Medium
                    </label>
                    <label style="display: block; margin: 10px 0; font-size: 16px;">
                        <input type="radio" name="difficulty" value="hard"> Hard
                    </label>
                </div>
                <div style="margin: 20px 0;">
                    <div style="font-weight: bold; margin-bottom: 10px; color: #333;">Who starts first:</div>
                    <label style="display: block; margin: 10px 0; font-size: 16px;">
                        <input type="radio" name="turn-order" value="player-first" checked> Me
                    </label>
                    <label style="display: block; margin: 10px 0; font-size: 16px;">
                        <input type="radio" name="turn-order" value="computer-first"> Computer
                    </label>
                    <label style="display: block; margin: 10px 0; font-size: 16px;">
                        <input type="radio" name="turn-order" value="random"> Random
                    </label>
                </div>
                <button onclick="startSinglePlayer()" style="background: #667eea; color: white;">Start Game</button>
            </div>

            <!-- Multiplayer Options -->
            <div id="multiplayerOptions" class="hidden">
                <button onclick="createMultiplayerGame()" style="width: 100%; padding: 15px; margin: 10px 0; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold;">Create Game</button>
                <button onclick="joinMultiplayerGame()" style="width: 100%; padding: 15px; margin: 10px 0; background: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold;">Join Game</button>
            </div>

            <div class="info-text">
                💡 The player who takes the last circle loses!
            </div>
        </div>

        <!-- Game Screen -->
        <div id="gameScreen" class="hidden">
            <div id="gameState">Loading...</div>
            <div id="gameCode" class="game-code hidden">
                <p>Your Code:</p>
                <div class="code" id="codeDisplay"></div>
            </div>

            <div class="board" id="board"></div>

            <div class="controls">
                <button id="submitBtn" onclick="submitMove()">Submit Move</button>
                <button id="mainMenuBtn" onclick="returnToMainMenu()">Main Menu</button>
            </div>

            <div class="info-text">
                💡 The player who takes the last circle loses!
            </div>
        </div>
    </div>

    <!-- Code Input Modal -->
    <div id="codeModal" class="modal">
        <div class="modal-content">
            <h2>Join Game</h2>
            <p>Enter the 3-digit game code:</p>
            <input type="text" id="codeInput" maxlength="3" placeholder="000" style="margin: 20px 0;">
            <br>
            <button onclick="submitGameCode()">Join</button>
            <button class="cancel-btn" onclick="closeCodeModal()">Cancel</button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebaseapp/11.0.0/firebase-app-compat.min.js"></script>
    <script src="https://www.gstatic.com/firebaseapp/11.0.0/firebase-database-compat.min.js"></script>

        firebase.initializeApp(firebaseConfig);

    <script src="game.js"></script>
</body>
</html>
